<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아기 한글 & 숫자 놀이</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #2b2b2b; font-family: 'Malgun Gothic', sans-serif; user-select: none; }
    
    #start-screen, #result-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; cursor: pointer; text-align: center; }
    #start-screen { background-color: #ffb74d; color: #333; font-size: 2.5rem; font-weight: bold; }
    #result-screen { background-color: rgba(0, 0, 0, 0.9); color: white; display: none; }
    
    .result-box { background: #444; padding: 2rem; border-radius: 20px; border: 4px solid #ffb74d; }
    .result-title { font-size: 2rem; margin-bottom: 1rem; color: #ffb74d; }
    .count-text { font-size: 3rem; margin-bottom: 2rem; }
    
    .btn-group { display: flex; gap: 1rem; justify-content: center; }
    button { padding: 1rem 2rem; font-size: 1.2rem; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
    .btn-share { background-color: #448AFF; color: white; }
    .btn-restart { background-color: #69F0AE; color: #333; }

    .letter { position: absolute; font-weight: 900; pointer-events: none; animation: popOut 1.5s cubic-bezier(0.25, 1.5, 0.5, 1) forwards; }
    @keyframes popOut {
      0% { transform: translate(-50%, -50%) scale(0.1); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
    }

    .bg-element { position: absolute; opacity: 0.1; pointer-events: none; z-index: -1; animation: float linear infinite; }
    @keyframes float { 0% { transform: translateY(110vh) rotate(0deg); } 100% { transform: translateY(-10vh) rotate(360deg); } }
  </style>
</head>
<body>

  <div id="start-screen">화면을 터치하여 시작!<br><span style="font-size: 1rem; margin-top: 10px;">(종료하려면 ESC를 누르세요)</span></div>

  <div id="result-screen">
    <div class="result-box">
      <div class="result-title">참 잘했어요!</div>
      <div class="count-text">총 <span id="final-count">0</span>번 눌렀어요</div>
      <div class="btn-group">
        <button class="btn-share" onclick="shareSite()">친구에게 공유하기</button>
        <button class="btn-restart" onclick="location.reload()">다시 놀기</button>
      </div>
    </div>
  </div>

  <script>
    const startScreen = document.getElementById('start-screen');
    const resultScreen = document.getElementById('result-screen');
    const finalCountEl = document.getElementById('final-count');
    let audioCtx;
    let isStarted = false;
    let pressCount = 0;

    const bgEmojis = ['⭐', '🪐', '🌙', '☄️', '🚀', '✨'];
    for (let i = 0; i < 20; i++) {
      const el = document.createElement('div');
      el.textContent = bgEmojis[Math.floor(Math.random() * bgEmojis.length)];
      el.className = 'bg-element';
      el.style.left = `${Math.random() * 100}vw`;
      el.style.animationDuration = `${20 + Math.random() * 30}s`;
      el.style.fontSize = `${1 + Math.random() * 3}rem`;
      document.body.appendChild(el);
    }

    startScreen.addEventListener('click', () => {
      startScreen.style.display = 'none';
      isStarted = true;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
    });

    // 브라우저 전체화면 종료(ESC 등) 감지 시 결과창 호출
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement && isStarted) {
        showResults();
      }
    });

    window.addEventListener('contextmenu', e => e.preventDefault());

    // 스페이스바('Space': '⭐') 삭제됨 -> 무작위 이모지로 넘어감
    const codeMap = {
      'Digit1':'1', 'Digit2':'2', 'Digit3':'3', 'Digit4':'4', 'Digit5':'5', 'Digit6':'6', 'Digit7':'7', 'Digit8':'8', 'Digit9':'9', 'Digit0':'0',
      'Numpad1':'1', 'Numpad2':'2', 'Numpad3':'3', 'Numpad4':'4', 'Numpad5':'5', 'Numpad6':'6', 'Numpad7':'7', 'Numpad8':'8', 'Numpad9':'9', 'Numpad0':'0',
      'KeyQ':'ㅂ', 'KeyW':'ㅈ', 'KeyE':'ㄷ', 'KeyR':'ㄱ', 'KeyT':'ㅅ', 'KeyY':'ㅛ', 'KeyU':'ㅕ', 'KeyI':'ㅑ', 'KeyO':'ㅐ', 'KeyP':'ㅔ',
      'KeyA':'ㅁ', 'KeyS':'ㄴ', 'KeyD':'ㅇ', 'KeyF':'ㄹ', 'KeyG':'ㅎ', 'KeyH':'ㅗ', 'KeyJ':'ㅓ', 'KeyK':'ㅏ', 'KeyL':'ㅣ',
      'KeyZ':'ㅋ', 'KeyX':'ㅌ', 'KeyC':'ㅊ', 'KeyV':'ㅍ', 'KeyB':'ㅠ', 'KeyN':'ㅜ', 'KeyM':'ㅡ'
    };

    const randomEmojis = ['🐶', '🐱', '🐰', '🦁', '🐷', '🐸', '🍎', '🍓', '🍇', '🚗', '🚌', '🚀', '🐳', '🍦', '🧸', '🌈', '🌻', '🍕', '🎨', '⚽'];
    const fireworkEmojis = ['✨', '💥', '🎇', '🎉', '🌟'];
    const colors = ['#FF5252', '#FF4081', '#E040FB', '#7C4DFF', '#536DFE', '#448AFF', '#18FFFF', '#69F0AE', '#EEFF41', '#FFD740', '#FFAB40'];

    window.addEventListener('keydown', (e) => {
      // 1. ESC 키 입력 최우선 차단
      if (e.code === 'Escape' || e.key === 'Escape') {
        if (isStarted) showResults();
        return;
      }
      if (!isStarted || e.key === 'F5' || e.key === 'F12') return;
      e.preventDefault();

      pressCount++;
      let char = codeMap[e.code] || randomEmojis[Math.floor(Math.random() * randomEmojis.length)];
      createVisuals(char);
      playTone();
    });

    window.addEventListener('mousedown', (e) => {
      if (!isStarted) return;
      pressCount++;
      createFirework(e.clientX, e.clientY);
      playTone();
    });

    let lastTrailTime = 0;
    window.addEventListener('mousemove', (e) => {
      if (!isStarted) return;
      const now = Date.now();
      if (now - lastTrailTime > 30) {
        createTrail(e.clientX, e.clientY);
        lastTrailTime = now;
      }
    });

    function showResults() {
      if (!isStarted) return;
      isStarted = false;
      finalCountEl.textContent = pressCount;
      resultScreen.style.display = 'flex';
      // 전체화면 강제 해제 (결과창을 더 안정적으로 표시)
      if (document.fullscreenElement) {
        document.exitFullscreen().catch(() => {});
      }
    }

    function shareSite() {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({ title: '아기 키보드 놀이', url: url });
      } else {
        navigator.clipboard.writeText(url);
        alert("사이트 주소가 복사되었습니다! 친구에게 전달해 주세요.");
      }
    }

    function createVisuals(char) {
      const el = document.createElement('div');
      el.textContent = char;
      el.className = 'letter';
      el.style.color = colors[Math.floor(Math.random() * colors.length)];
      const size = 6 + Math.random() * 12; 
      el.style.fontSize = `${size}vw`;
      el.style.left = `${10 + Math.random() * 80}%`;
      el.style.top = `${10 + Math.random() * 80}%`;
      el.style.transform = `translate(-50%, -50%) rotate(${(Math.random() * 60) - 30}deg)`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1500);
    }

    function createFirework(x, y) {
      const num = 12;
      for (let i = 0; i < num; i++) {
        const el = document.createElement('div');
        el.textContent = fireworkEmojis[Math.floor(Math.random() * fireworkEmojis.length)];
        el.style.position = 'absolute';
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        el.style.fontSize = '2rem';
        el.style.pointerEvents = 'none';
        const angle = Math.random() * Math.PI * 2;
        const dist = 100 + Math.random() * 100;
        el.animate([
          { transform: `translate(-50%, -50%) scale(0.5)`, opacity: 1 },
          { transform: `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px)) scale(1.5)`, opacity: 0 }
        ], { duration: 800, fill: 'forwards' });
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);
      }
    }

    function createTrail(x, y) {
      const el = document.createElement('div');
      el.textContent = '⭐';
      el.style.position = 'absolute';
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      el.style.fontSize = `${0.5 + Math.random() * 1}rem`;
      el.style.pointerEvents = 'none';
      el.style.opacity = '0.8';
      el.animate([
        { transform: 'translate(-50%, -50%) scale(1)', opacity: 0.8 },
        { transform: `translate(-50%, calc(-50% + 30px)) scale(0.1)`, opacity: 0 }
      ], { duration: 400, fill: 'forwards' });
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 400);
    }

    function playTone() {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300 + Math.random() * 600, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }
  </script>
</body>
</html>
